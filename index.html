<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOOBER - Moon Rover</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #ui-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 10;
    }

    #hud-top-left {
      position: absolute;
      top: 20px; left: 20px;
      color: #aaa;
      font-size: 14px;
    }

    #hud-title {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 24px;
      letter-spacing: 12px;
      text-shadow: 0 0 20px rgba(100, 180, 255, 0.5);
    }

    #hud-controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #666;
      font-size: 12px;
      text-align: center;
    }

    #join-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: all;
    }

    #join-modal.hidden { display: none; }

    #join-box {
      text-align: center;
      color: #fff;
    }

    #join-box h1 {
      font-size: 48px;
      letter-spacing: 16px;
      margin-bottom: 8px;
      text-shadow: 0 0 30px rgba(100, 180, 255, 0.6);
    }

    #join-box p {
      color: #888;
      margin-bottom: 32px;
      font-size: 14px;
    }

    #join-box input {
      background: transparent;
      border: 1px solid #444;
      color: #fff;
      padding: 12px 20px;
      font-size: 18px;
      font-family: 'Courier New', monospace;
      text-align: center;
      outline: none;
      width: 260px;
      margin-bottom: 16px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    #join-box input:focus { border-color: #6ab4ff; }

    #join-box button {
      background: #fff;
      color: #000;
      border: none;
      padding: 12px 40px;
      font-size: 16px;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      letter-spacing: 4px;
      transition: background 0.2s;
    }

    #join-box button:hover { background: #6ab4ff; }
  </style>
</head>
<body>
  <div id="ui-overlay">
    <div id="hud-title">MOOBER</div>
    <div id="hud-top-left">
      <div id="player-count">connecting...</div>
    </div>
    <div id="hud-controls">WASD or Arrow Keys to drive &bull; Space to brake</div>
  </div>

  <div id="join-modal">
    <div id="join-box">
      <h1>MOOBER</h1>
      <p>Multiplayer Moon Rover</p>
      <input type="text" id="name-input" placeholder="Enter your name" maxlength="16" autofocus />
      <button id="join-btn">LAUNCH</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
