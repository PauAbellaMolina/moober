<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOOBER - Moon Rover</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #ui-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 10;
    }

    #hud-top-left {
      position: absolute;
      top: 20px; left: 20px;
      color: #aaa;
      font-size: 14px;
    }

    #hud-title {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 24px;
      letter-spacing: 12px;
      text-shadow: 0 0 20px rgba(100, 180, 255, 0.5);
    }

    #hud-controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #666;
      font-size: 12px;
      text-align: center;
    }

    #battery-bar {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 14px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 3px;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    #battery-fill {
      height: 100%;
      width: 100%;
      background: #4ecdc4;
      transition: width 0.3s, background-color 0.5s;
      border-radius: 2px;
    }

    #battery-text {
      position: absolute;
      width: 100%;
      text-align: center;
      color: #fff;
      font-size: 9px;
      text-shadow: 0 0 3px #000;
    }

    #battery-label {
      position: absolute;
      bottom: 67px;
      left: 50%;
      transform: translateX(-50%);
      color: #555;
      font-size: 10px;
      letter-spacing: 2px;
    }

    #attribution {
      position: absolute;
      bottom: 4px;
      right: 10px;
      color: #444;
      font-size: 9px;
      pointer-events: all;
    }

    #tool-hud {
      position: absolute;
      top: 20px;
      right: 20px;
      color: #aaa;
      font-size: 12px;
      text-align: right;
    }

    #tool-hud .tool-item {
      padding: 3px 8px;
      margin-bottom: 2px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 3px;
    }

    #tool-hud .tool-item.active {
      color: #fff;
      border-color: rgba(100,180,255,0.5);
      background: rgba(100,180,255,0.1);
    }

    #inventory-hud {
      position: absolute;
      top: 80px;
      right: 20px;
      color: #888;
      font-size: 11px;
      text-align: right;
    }

    #inventory-hud .mineral-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      margin-bottom: 2px;
    }

    .mineral-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .mineral-count {
      min-width: 16px;
      text-align: right;
      color: #aaa;
    }

    #interaction-prompt {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 14px;
      text-align: center;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
      opacity: 0;
      transition: opacity 0.2s;
    }

    #interaction-prompt.visible { opacity: 1; }


    #join-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: all;
    }

    #join-modal.hidden { display: none; }

    #join-box {
      text-align: center;
      color: #fff;
    }

    #join-box h1 {
      font-size: 48px;
      letter-spacing: 16px;
      margin-bottom: 8px;
      text-shadow: 0 0 30px rgba(100, 180, 255, 0.6);
    }

    #join-box p {
      color: #888;
      margin-bottom: 32px;
      font-size: 14px;
    }

    #join-box input {
      background: transparent;
      border: 1px solid #444;
      color: #fff;
      padding: 12px 20px;
      font-size: 18px;
      font-family: 'Courier New', monospace;
      text-align: center;
      outline: none;
      width: 260px;
      margin-bottom: 16px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    #join-box input:focus { border-color: #6ab4ff; }

    #join-box button {
      background: #fff;
      color: #000;
      border: none;
      padding: 12px 40px;
      font-size: 16px;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      letter-spacing: 4px;
      transition: background 0.2s;
    }

    #join-box button:hover { background: #6ab4ff; }
  </style>
</head>
<body>
  <div id="ui-overlay">
    <div id="hud-title">MOOBER</div>
    <div id="hud-top-left">
      <div id="player-count">connecting...</div>
    </div>
    <div id="tool-hud">
      <div class="tool-item active" id="tool-drive">1: DRIVE</div>
      <div class="tool-item" id="tool-drill">2: DRILL</div>
    </div>
    <div id="inventory-hud"></div>
    <div id="interaction-prompt">
      <div id="prompt-text"></div>
    </div>
    <div id="battery-label">BATTERY</div>
    <div id="battery-bar">
      <div id="battery-fill"></div>
      <div id="battery-text">100%</div>
    </div>
    <div id="hud-controls">WASD drive &bull; Space brake &bull; H lights &bull; 1/2 tools &bull; E mine</div>
    <div id="attribution">Models via <a href="https://poly.pizza" target="_blank" style="color:#555">Poly Pizza</a>: Poly by Google, Quaternius, iPoly3D, <a href="https://poly.pizza/m/fOScYcI2Oh" target="_blank" style="color:#555">Zsky</a>, <a href="https://poly.pizza/m/cOPSP0iKuju" target="_blank" style="color:#555">Mark Steelman</a> &bull; <a href="https://creativecommons.org/licenses/by/3.0/" target="_blank" style="color:#555">CC-BY</a></div>
  </div>

  <div id="join-modal">
    <div id="join-box">
      <h1>MOOBER</h1>
      <p>Multiplayer Moon Rover</p>
      <input type="text" id="name-input" placeholder="Enter your name" maxlength="16" autofocus />
      <button id="join-btn">LAUNCH</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
